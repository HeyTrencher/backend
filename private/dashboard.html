<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forensic Dashboard</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .header-left { display:flex; align-items:center; gap:12px; }

    .header-icon {
      width:36px; height:36px;
      background:#3b82f6;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .header-title { font-weight:700; font-size:0.95rem; }
    .header-sub { font-size:0.75rem; color:#94a3b8; }

    #logoutBtn {
      padding:7px 14px;
      background:#ef4444;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .container {
      display:flex;
      gap:20px;
      padding:24px;
      max-width:1400px;
      margin:0 auto;
      align-items:flex-start;
    }

    .card {
      background:white;
      border:1px solid #e2e8f0;
      border-radius:12px;
      box-shadow:0 1px 4px rgba(0,0,0,0.06);
      overflow:hidden;
    }

    .card-header {
      display:flex;
      justify-content:space-between;
      padding:14px 20px;
      border-bottom:1px solid #e2e8f0;
    }

    .card-header h2 { font-size:0.95rem; }

    .meta { font-size:0.75rem; color:#94a3b8; }

    .card-body { padding:12px; }

    #devicesCard { flex:1; }
    #pipelineCard { width:420px; }
    #uploadCard { width:300px; }

    .empty-state {
      padding:30px;
      text-align:center;
      color:#94a3b8;
      font-size:0.85rem;
    }

    /* PIPELINE */
    .pipeline-item {
      border-bottom:1px solid #e2e8f0;
      padding:10px;
    }

    .pipeline-header {
      cursor:pointer;
    }

    .pipeline-stage {
      font-weight:700;
      color:#3b82f6;
      font-size:0.85rem;
    }

    .pipeline-meta {
      font-size:0.7rem;
      color:#64748b;
      margin-top:2px;
    }

    .pipeline-details {
      display:none;
      margin-top:8px;
      padding:10px;
      background:#0f172a;
      color:#e2e8f0;
      font-size:11px;
      border-radius:6px;
      overflow:auto;
      max-height:250px;
    }

  </style>
</head>

<body>

<header>
  <div class="header-left">
    <div class="header-icon">📁</div>
    <div>
      <div class="header-title">Forensic Dashboard</div>
      <div class="header-sub">File collection & review</div>
    </div>
  </div>
  <button id="logoutBtn">Logout</button>
</header>

<div class="container">

  <!-- DEVICES -->
  <div class="card" id="devicesCard">
    <div class="card-header">
      <h2>Devices</h2>
      <div class="meta" id="deviceCount">0 devices</div>
    </div>
    <div class="card-body" id="deviceList">
      <div class="empty-state">Loading devices...</div>
    </div>
  </div>

  <!-- PIPELINE -->
  <div class="card" id="pipelineCard">
    <div class="card-header">
      <h2>Pipeline Activity</h2>
      <div class="meta" id="pipelineCount">0 events</div>
    </div>
    <div class="card-body" id="pipelineList">
      <div class="empty-state">Loading pipeline...</div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="card" id="uploadCard">
    <div class="card-header">
      <h2>Upload</h2>
    </div>

    <div class="card-body">
      <form id="uploadForm">
        <input id="deviceUUID" placeholder="Device UUID" required style="width:100%;margin-bottom:10px;padding:8px;">
        <input id="category" placeholder="Category" required style="width:100%;margin-bottom:10px;padding:8px;">
        <input id="fileInput" type="file" required style="margin-bottom:10px;">
        <button id="submitBtn" style="width:100%;padding:10px;background:#3b82f6;color:white;border:none;">
          Upload
        </button>
      </form>
    </div>
  </div>

</div>

<script>
const deviceList = document.getElementById("deviceList");
const deviceCount = document.getElementById("deviceCount");

const pipelineList = document.getElementById("pipelineList");
const pipelineCount = document.getElementById("pipelineCount");

/* ---------------- DEVICES ---------------- */

async function fetchDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    deviceCount.textContent = `${data.length} devices`;

    deviceList.innerHTML = data.length ? "" : "<div class='empty-state'>No devices</div>";

    data.forEach(d => {
      const div = document.createElement("div");
      div.textContent = d.deviceUUID;
      div.style.padding = "6px";
      deviceList.appendChild(div);
    });

  } catch {
    deviceList.innerHTML = "<div class='empty-state'>Error loading devices</div>";
  }
}

/* ---------------- PIPELINE (CLICKABLE FIX) ---------------- */

function renderPipeline(data) {
  const arr = Array.isArray(data) ? data : Object.values(data || {}).flat();

  pipelineCount.textContent = `${arr.length} events`;

  if (!arr.length) {
    pipelineList.innerHTML = `<div class="empty-state">No pipeline data</div>`;
    return;
  }

  pipelineList.innerHTML = "";

  arr.slice().reverse().forEach(item => {
    const wrapper = document.createElement("div");
    wrapper.className = "pipeline-item";

    const header = document.createElement("div");
    header.className = "pipeline-header";

    header.innerHTML = `
      <div class="pipeline-stage">▶ ${item.stage || "unknown"}</div>
      <div class="pipeline-meta">${new Date(item.time || Date.now()).toLocaleString()}</div>
    `;

    const details = document.createElement("pre");
    details.className = "pipeline-details";
    details.textContent = JSON.stringify(item, null, 2);

    header.addEventListener("click", () => {
      details.style.display = details.style.display === "block" ? "none" : "block";
    });

    wrapper.appendChild(header);
    wrapper.appendChild(details);
    pipelineList.appendChild(wrapper);
  });
}

async function fetchPipeline() {
  try {
    const res = await fetch("/pipeline");
    const data = await res.json();
    renderPipeline(data);
  } catch {
    pipelineList.innerHTML = "<div class='empty-state'>Pipeline error</div>";
  }
}

/* ---------------- INIT ---------------- */

fetchDevices();
fetchPipeline();

setInterval(fetchDevices, 10000);
setInterval(fetchPipeline, 5000);

</script>

</body>
</html>
